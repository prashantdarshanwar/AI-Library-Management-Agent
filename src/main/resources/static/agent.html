<!DOCTYPE html>
<html>
<head>
    <title>Library AI Agent</title>
</head>
<body>

<h2>📚 Library AI Assistant</h2>

<input type="text" id="query" placeholder="Ask about books..." />
<button onclick="search()">Search</button>

<h3>Results:</h3>
<ul id="results"></ul>

<script>
function search() {
    let q = document.getElementById("query").value;

    fetch(`/api/agent/ask?query=${q}`)
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("results");
        list.innerHTML = "";

        data.forEach(book => {
            let item = `<li>${book.title} - ${book.author} (${book.available ? "Available" : "Not Available"})</li>`;
            list.innerHTML += item;
        });
    });
}
</script>

</body>
</html>
