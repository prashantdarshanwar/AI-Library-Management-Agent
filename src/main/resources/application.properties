# --- DATABASE CONFIGURATION (Railway MySQL) ---
# Use Spring placeholders for Railway environment variables
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# REMOVED: spring.jpa.database-platform (Let Spring Boot 3+ auto-detect this to prevent warnings)

# --- SERVER PORT (IMPORTANT FOR RAILWAY) ---
server.port=${PORT:8080}

# --- ERROR DEBUGGING ---
server.error.include-message=always
server.error.include-binding-errors=always

# --- BASIC SECURITY (TEMP ONLY) ---
spring.security.user.name=admin
spring.security.user.password=admin

# --- PAYLOAD SETTINGS (For 3D Avatar/Photos) ---
spring.codec.max-in-memory-size=5MB
server.tomcat.max-swallow-size=5MB
server.tomcat.max-http-form-post-size=5MB