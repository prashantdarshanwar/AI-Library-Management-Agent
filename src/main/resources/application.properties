# --- DATABASE CONFIGURATION (Railway MySQL) ---
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- SERVER PORT (IMPORTANT FOR RAILWAY) ---
server.port=${PORT:8080}

# --- ERROR DEBUGGING ---
server.error.include-message=always
server.error.include-binding-errors=always

# --- BASIC SECURITY (TEMP ONLY) ---
spring.security.user.name=admin
spring.security.user.password=admin

# --- PAYLOAD SETTINGS (For 3D Avatar/Photos) ---
spring.codec.max-in-memory-size=5MB
server.tomcat.max-swallow-size=5MB
server.tomcat.max-http-form-post-size=5MB