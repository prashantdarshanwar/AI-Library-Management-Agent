# --- DATABASE CONFIGURATION ---
# Railway provides these variables automatically when you provision a MySQL service
spring.datasource.url=jdbc:${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- SERVER SETTINGS ---
# Railway uses the PORT variable to assign a public internal port
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# --- SECURITY ---
spring.security.user.name=${ADMIN_USER:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin}

# --- PAYLOAD SETTINGS (For 3D Avatar/Photos) ---
spring.codec.max-in-memory-size=5MB
server.tomcat.max-swallow-size=5MB
server.tomcat.max-http-form-post-size=5MB