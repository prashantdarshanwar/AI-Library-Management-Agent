# --- DATABASE CONFIGURATION ---
# Railway's ${MYSQL_URL} already includes 'jdbc:mysql://'
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Use MySQL8Dialect for modern compatibility
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- SERVER SETTINGS ---
# ${PORT} is assigned by Railway; 8080 is your local fallback
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# --- SECURITY ---
spring.security.user.name=${ADMIN_USER:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin}

# --- PAYLOAD SETTINGS (For 3D Avatar/Photos) ---
spring.codec.max-in-memory-size=5MB
server.tomcat.max-swallow-size=5MB
server.tomcat.max-http-form-post-size=5MB