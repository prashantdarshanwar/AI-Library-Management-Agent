# --- DATABASE CONFIGURATION ---
# SPRING_DATASOURCE_URL is injected by Railway referencing ${{MySQL.MYSQL_URL}}.
# Fallback constructs the URL from individual Railway MySQL variables when the
# combined variable is not present (e.g. local development).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&requireSSL=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Explicitly set the dialect so Hibernate does not need a live JDBC connection
# at startup to auto-detect it. MySQLDialect covers MySQL 8+ and MySQL 9.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- SERVER SETTINGS ---
# ${PORT} is assigned by Railway; 8080 is your local fallback
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# --- SECURITY ---
spring.security.user.name=${ADMIN_USER:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin}

# --- PAYLOAD SETTINGS (For 3D Avatar/Photos) ---
spring.codec.max-in-memory-size=5MB
server.tomcat.max-swallow-size=5MB
server.tomcat.max-http-form-post-size=5MB