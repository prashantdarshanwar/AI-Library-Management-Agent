# --- DATABASE CONFIGURATION ---
# Railway's ${MYSQL_URL} already starts with 'jdbc:mysql://'
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Using the modern dialect for MySQL 8+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- SERVER SETTINGS ---
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# --- SECURITY ---
spring.security.user.name=${ADMIN_USER:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin}

# --- PAYLOAD SETTINGS (For 3D Avatar/Photos) ---
spring.codec.max-in-memory-size=5MB
server.tomcat.max-swallow-size=5MB
server.tomcat.max-http-form-post-size=5MB